<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folder Update</title>
     <script src="../browser@4.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">  <!-- Header -->  <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold">Clinical Update</h1>
    <a href="../dashboard.html" class="bg-white rounded text-blue-600 px-4 py-2  hover:bg-gray-100">
      HOME
    </a>
  </header>  <!-- Main Content -->  <main class="p-6"><div class="max-w-4xl mx-auto">

  <!-- Welcome Section -->
  <div class="bg-white p-6 rounded-2xl shadow mb-6">
    <h2 class="text-2xl font-semibold mb-2 text-gray-800">Welcome</h2>
    <p class="text-gray-600">
      Use this section to upload patient clinical files and record clerking notes.
    </p>
  </div>

  <!-- Menu Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Upload Files -->
    <div onclick="goToUpload()"
         class="cursor-pointer bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
      <h3 class="text-lg font-semibold mb-2 text-blue-600">Upload Clinical File</h3>
      <p class="text-gray-600">
        Upload laboratory results, scans, prescriptions, and other medical files.
      </p>
    </div>

    <!-- Clerking Form -->
    <div onclick="goToClerking()"
         class="cursor-pointer bg-white p-6 rounded-2xl shadow hover:shadow-lg transition">
      <h3 class="text-lg font-semibold mb-2 text-blue-600">Clerking Form</h3>
      <p class="text-gray-600">
        Record patient complaints, history, examination, and clinical notes.
      </p>
    </div>

  </div>

</div>

  </main>  <!-- JavaScript -->  <script>
  
  const params = new URLSearchParams(window.location.search);
  const pNumber = params.get("patientNumber");
  function goToUpload() {
    window.location.href = 'upload.html?patientNumber='+pNumber;
  }
  function goToClerking() {
    window.location.href = 'clerking.html?patientNumber='+pNumber;
  }
  </script>
 </body>
</html>
