    document.getElementById('clerkingForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      let presubmitTxt = submitBtn.innerHTML;
      submitBtn.innerHTML = "Saving..";
      submitBtn.disabled = true;
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());
      data.createdBy = auth.currentUser.email;
      data.createdAt = serverTimestamp();
      let docRef = doc(collection(db, "files"));
      await setDoc(docRef, data);
      console.log('Clerking Data:', data);
      alert('Record saved successfully!');
      submitBtn.innerHTML = presubmitTxt;
      this.reset();
      submitBtn.disabled = false;
    });

  <script>
const textarea = document.getElementById("content");

  function dobToAge(dobString) {
  const today = new Date();
  const dob = new Date(dobString);

  let age = today.getFullYear() - dob.getFullYear();

  const monthDifference = today.getMonth() - dob.getMonth();

  // If birthday hasn't occurred yet this year, subtract 1
  if (
    monthDifference < 0 ||
    (monthDifference === 0 && today.getDate() < dob.getDate())
  ) {
    age--;
  }

  return age;
}
