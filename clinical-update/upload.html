  // SETTINGS
const MAX_WIDTH = 1024;
const MAX_HEIGHT = 1024;
const QUALITY = 0.7; // 0.1 - 1.0
  function optimizeImage(file) {
  return new Promise((resolve) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {

      let { width, height } = img;

      // Maintain aspect ratio
      if (width > MAX_WIDTH || height > MAX_HEIGHT) {
        const ratio = Math.min(
          MAX_WIDTH / width,
          MAX_HEIGHT / height
        );

        width *= ratio;
        height *= ratio;
      }

      // Canvas
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      // Convert to Blob (Compressed)
      canvas.toBlob(
        blob => resolve(blob),
        "image/jpeg",
        QUALITY
      );
    };

    reader.readAsDataURL(file);
  });
}
  
  async function uploadToCloudinary(file, meta) {
  const formData = new FormData();
  formData.append("file", file);
    console.log(uploadPreset);
  formData.append("upload_preset", uploadPreset);

  // Add custom context for webhook
  // context format: "key1=value1|key2=value2"
  formData.append(
    "context",
    `id=${meta.id}|tag=${meta.tag}|patientNumber=${meta.patientNumber}|createdBy=${meta.createdBy}`
  );

  // Optional: tags
  formData.append("tags", "medical file");

  // Webhook URL
 // formData.append("notification_url", "https://cfx-mainafly.netlify.app/.netlify/functions/nagari-wh");
  // Upload
  const response = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData,
    }
  );
  
  const data = await response.json();
    console.log(JSON.stringify(data));
  console.log("Uploaded:", data.secure_url);
  return data.secure_url;
}
