<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New User Registration</title>
    <script src="../browser@4.js"></script>
</head>
<body class="bg-gray-100 min-h-screen"> 
  <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold">New User</h1>
    <a href="../dashboard.html" class="bg-white rounded text-blue-600 px-4 py-2 hover:bg-gray-100">
      HOME
    </a>
  </header>

  <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-lg">
    <!-- Registration Form -->
    <form id="newUserForm" class="space-y-4">
      <div>
        <label class="block font-medium mb-1">First Name</label>
        <input type="text" name="firstName" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
      </div>

      <div>
        <label class="block font-medium mb-1">Middle Name</label>
        <input type="text" name="middleName" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
      </div>

      <div>
        <label class="block font-medium mb-1">Last Name</label>
        <input type="text" name="lastName" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
      </div>

      <div>
        <label class="block font-medium mb-1">Gender</label>
        <select name="gender" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div>
        <label class="block font-medium mb-1">Username</label>
        <input type="text" name="username" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300" placeholder="usename">
      </div>

      <div>
        <label class="block font-medium mb-1">Password</label>
        <input type="password" name="password" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
      </div>

      <div class="flex justify-end pt-4">
        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Register</button>
      </div>
    </form>
  </div>  

  <script>
    const CLOUD_FUNCTION_URL = "https://cfx-mainafly.netlify.app/.netlify/functions/nagari-user-mgt"; // Replace with your cloud function endpoint

    document.getElementById('newUserForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      // Build payload for cloud function
      const payload = {
        operator: "register",
        appId: "nagari", // Replace with the actual appId in Firestore
        email: (data.username+"@nagaripolyclinic.com").toLowerCase(),
        username: data.username.toLowerCase(),
        password: data.password,
        firstName: data.firstName.toLowerCase(),
        middleName: data.middleName.toLowerCase(),
        lastName: data.lastName.toLowerCase(),
        gender: data.gender.toLowerCase()
      };

      try {
        const response = await fetch(CLOUD_FUNCTION_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (response.ok) {
          alert("User registered successfully!");
          this.reset();
        } else {
          alert("Error: " + (result.error || "Unknown error"));
        }

      } catch (err) {
        console.error("Request failed:", err);
        alert("Failed to register user: " + err.message);
      }
    });
  </script>
</body>
</html>
