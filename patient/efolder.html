let pNumber = patient.patientNumber;

  const db = getFirestore(app);
  
  let q = query(
      collection(db, "files"),

     );
  
  
  function getQueryDateBeween(){
    if (!dateFrom.value) return null;
    if (!dateTo.value) return null;
    const fromDate = new Date(dateFrom.value);
    const toDate = new Date(dateTo.value);

// Make dateTo include the full day (23:59:59)
    toDate.setHours(23, 59, 59, 999);
    let q = query(
  collection(db, "files"),
  where("patientNumber", "==", pNumber),
  where("createdAt", ">=", Timestamp.fromDate(fromDate)),
  where("createdAt", "<=", Timestamp.fromDate(toDate)),
  orderBy("createdAt", "desc")
    );
    return q;
  }

    // Demo files for this patient
  dateTo.onchange = e=>{
    let q = getQueryDateBeween();
    if (q)
    renderFiles(q);
  }
  dateFrom.onchange = e=>{
    let q = getQueryDateBeween();
    if (q)
    renderFiles(q);
  }

   async function renderFiles(q) {

     // { file: 'prescription1.png', tag: 'Prescription', uploadedBy: 'Dr. User', uploadedAt: '2026-02-15T10:00:00' },

    ];
  
  efileDocs.forEach(d=>{
    let data = d.data();
    eFolderFiles.push(data)
  })
      const container = document.getElementById('eFolderFiles');
     container.innerHTML = "";
      let filtered = eFolderFiles;
      /*if (from) {

      }

      }
     filtered.sort((a, b) => new Date(a.uploadedAt) - new Date(b.uploadedAt));
      */
      if (filtered.length === 0) {

        console.log(filtered[0].createdAt.toLocaleString());
        container.innerHTML= "";
        filtered.forEach(f => {
          console.log(JSON.stringify(f));
          let fileElm = document.createElement("div");

          `;

          }

        });

   /* document.getElementById('dateFrom').addEventListener('change', () => {

    document.getElementById('printedAt').innerText = new Date().toLocaleString();
  function dobToAge(dobString) {
  const today = new Date();
  const dob = new Date(dobString);

  let age = today.getFullYear() - dob.getFullYear();

  const monthDifference = today.getMonth() - dob.getMonth();

  // If birthday hasn't occurred yet this year, subtract 1
  if (
    monthDifference < 0 ||
    (monthDifference === 0 && today.getDate() < dob.getDate())
  ) {
    age--;
  }

  return age;
}
